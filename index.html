document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fspan>\n                  <span style=\"flex:1;height:1px;background:repeating-linear-gradient(90deg,rgba(233,215,183,.4),rgba(233,215,183,.4) 4px,transparent 4px,transparent 8px)\"><\u002Fspan>\n                  <span>{{ t.frontage }}<\u002Fspan>\n                  <span style=\"flex:1;height:1px;background:repeating-linear-gradient(90deg,rgba(233,215,183,.4),rgba(233,215,183,.4) 4px,transparent 4px,transparent 8px)\"><\u002Fspan>\n                  <span>→|<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"totals\" style=\"margin-top:16px;background:#123027;border:1.5px solid rgba(233,215,183,.28);border-radius:8px;padding:14px 18px;display:flex;flex-wrap:wrap;gap:26px;align-items:center;justify-content:space-between\">\n            <div style=\"display:flex;flex-direction:column;gap:2px\">\n              <span style=\"font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(233,215,183,.4)\">{{ t.totalArea }}<\u002Fspan>\n              <span style=\"font-family:'Space Mono',monospace;font-size:15px;color:#f3e6cb\">{{ areaFmt }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:2px\">\n              <span style=\"font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(233,215,183,.4)\">{{ t.gross }}<\u002Fspan>\n              <span style=\"font-family:'Space Mono',monospace;font-size:15px;color:#f3e6cb\">{{ grossFmt }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:2px\">\n              <span style=\"font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(233,215,183,.4)\">{{ t.discApplied }}<\u002Fspan>\n              <span style=\"font-family:'Space Mono',monospace;font-size:15px;color:#d97a48\">−{{ discTotalFmt }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:2px\">\n              <span style=\"font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(233,215,183,.4)\">{{ t.netColl }}<\u002Fspan>\n              <span style=\"font-family:'Space Mono',monospace;font-weight:700;font-size:16px;color:#e0b168\">{{ netTotalFmt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1300,&quot;height&quot;:900},&quot;grid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Blueprint&quot;},&quot;dims&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Blueprint&quot;}}\">\nconst T = {\n  nl: {\n    loginTitle: 'Huis Temara', enterCode: 'Voer toegangscode in',\n    unlock: 'Ontgrendelen →', wrongCode: 'Onjuiste code — probeer opnieuw.', hint: 'Hint — de code is ',\n    title: 'Huis Temara — Plattegronden', subtitle: 'Temara · Rabat, Marokko',\n    dwg: 'DWG-01 · WOONGEBOUW', levels: '3 VERDIEPINGEN · 9 WONINGEN',\n    fund: 'Erfenisfonds', plot: 'De grond', plotValue: 'Waarde van de grond', cleanup: 'Minus sloop & opruiming',\n    net: 'Netto te verdelen', shares: 'Aandelen — 7 broers · 2 zussen',\n    sharesNote: 'Zussen ontvangen een half aandeel van een broer.',\n    eachBrother: 'Elke broer (×7)', eachSister: 'Elke zus (×2)', payouts: 'Contante uitbetalingen',\n    fourBrother: '2 × broeraandeel', appliedDisc: 'Erfdeel verrekend met de woning',\n    nordinShare: 'Nordin — 1 broeraandeel', rachidShare: 'Rachid — 1 broeraandeel', abdellahShare: 'Abdellah — 1 broeraandeel', fathmaShare: 'Fathma — 1 zusaandeel', heddaShare: 'Hedda — 1 zusaandeel', radiShare: 'Radi — erfdeel',\n    pricing: 'Woningprijzen', pricePerM2: 'Prijs per m²',\n    priceNoteA: 'Prijs per woning = ', priceNoteB: ' − erfdeel. Vul de m² per woning in op de plattegrond →',\n    terrace: '◆ DAKTERRAS', floor: 'VERDIEPING', frontage: 'STRAATGEVEL',\n    totalArea: 'Totale oppervlakte', gross: 'Brutowaarde', discApplied: 'Erfdeel verrekend', netColl: 'Netto te innen',\n    inheritance: 'erfdeel', estimate: 'Alle bedragen en oppervlaktes zijn voorlopige schattingen.', estimateTag: 'SCHATTING', locale: 'nl-NL',\n  },\n  fr: {\n    loginTitle: 'Maison Temara', enterCode: \"Entrez le code d'accès\",\n    unlock: 'Déverrouiller →', wrongCode: 'Code incorrect — réessayez.', hint: 'Indice — le code est ',\n    title: 'Maison Temara — Plans', subtitle: 'Temara · Rabat, Maroc',\n    dwg: 'DWG-01 · RÉSIDENTIEL', levels: '3 NIVEAUX · 9 LOGEMENTS',\n    fund: 'Fonds successoral', plot: 'Le terrain', plotValue: 'Valeur du terrain', cleanup: 'Moins démolition & nettoyage',\n    net: 'Net à répartir', shares: 'Parts — 7 frères · 2 sœurs',\n    sharesNote: \"Les sœurs reçoivent une demi-part de celle d'un frère.\",\n    eachBrother: 'Chaque frère (×7)', eachSister: 'Chaque sœur (×2)', payouts: 'Versements en espèces',\n    fourBrother: '2 × part de frère', appliedDisc: \"Part d'héritage déduite du logement\",\n    nordinShare: 'Nordin — 1 part de frère', rachidShare: 'Rachid — 1 part de frère', abdellahShare: 'Abdellah — 1 part de frère', fathmaShare: 'Fathma — 1 part de sœur', heddaShare: 'Hedda — 1 part de sœur', radiShare: 'Radi — héritage',\n    pricing: 'Prix des logements', pricePerM2: 'Prix par m²',\n    priceNoteA: 'Prix par logement = ', priceNoteB: \" − part d'héritage. Saisissez les m² de chaque logement sur le plan →\",\n    terrace: '◆ TERRASSE SUR LE TOIT', floor: 'NIVEAU', frontage: 'FAÇADE SUR RUE',\n    totalArea: 'Surface totale', gross: 'Valeur brute', discApplied: 'Héritage déduit', netColl: 'Net à percevoir',\n    inheritance: 'héritage', estimate: 'Tous les montants et surfaces sont des estimations provisoires.', estimateTag: 'ESTIMATION', locale: 'fr-FR',\n  },\n};\n\nclass Component extends DCLogic {\n  state = {\n    pw: '', locked: true, err: false, shake: 0, selected: '',\n    fundOpen: false, lang: 'nl',\n    ground: 300000, cleanup: 20000, ppsm: 0,\n    sqm: { Nordin: 85, Rachid: 65, Karima: 85, Fathma: 85, Chadia: 65, Hedda: 85, Radi: 100, Abdellah: 30, 'Mourad Ouissam': 70 },\n  };\n\n  renderVals() {\n    const s = this.state;\n    const t = T[s.lang] || T.nl;\n    const fmt = (n) => (n < 0 ? '−€\\u00a0' : '€\\u00a0') + Math.abs(Math.round(n || 0)).toLocaleString(t.locale);\n    const num = (v) => (v === '' || v == null ? 0 : (parseFloat(v) || 0));\n\n    const BROTHERS = 7, SISTERS = 2;\n    const net = Math.max(0, num(s.ground) - num(s.cleanup));\n    const denom = BROTHERS + SISTERS / 2;\n    const brotherShare = denom > 0 ? net / denom : 0;\n    const sisterShare = brotherShare / 2;\n    const payout = 2 * brotherShare;\n\n    const discMap = { Nordin: brotherShare, Rachid: brotherShare, Abdellah: brotherShare, Fathma: sisterShare, Hedda: sisterShare };\n    const ppsm = num(s.ppsm);\n    const unit = (name, code) => {\n      const area = num(s.sqm[name]);\n      const gross = area * ppsm;\n      const isFull = name === 'Radi';           // inheritance covers the apartment exactly\n      const disc = isFull ? gross : (discMap[name] || 0);\n      const priced = area > 0 && ppsm > 0;\n      return {\n        name, code,\n        sqmVal: (s.sqm[name] === undefined || s.sqm[name] === null) ? '' : s.sqm[name],\n        price: isFull ? fmt(0) : (priced ? '≈ ' + fmt(gross - disc) : '—'),\n        hasDisc: disc > 0,\n        discLabel: disc > 0 ? '− ' + fmt(disc) + ' ' + t.inheritance : '',\n      };\n    };\n\n    const radiGross = num(s.sqm['Radi']) * ppsm;\n    const totalArea = Object.keys(s.sqm).reduce((a, k) => a + num(s.sqm[k]), 0);\n    const grossTotal = totalArea * ppsm;\n    const discTotal = 3 * brotherShare + 2 * sisterShare + radiGross;\n    const netTotal = grossTotal - discTotal;\n\n    const active = '#e0b168', activeCol = '#08201a', inCol = 'rgba(233,215,183,.7)';\n    const isNl = s.lang === 'nl';\n\n    const check = () => {\n      if (this.state.pw.trim() === '123') this.setState({ locked: false, err: false });\n      else this.setState(st => ({ err: true, shake: st.shake + 1 }));\n    };\n\n    return {\n      t,\n      pw: s.pw, locked: s.locked, unlocked: !s.locked, err: s.err,\n      shakeAnim: s.shake ? `bp-shake .4s ease ${s.shake}` : 'none',\n      grid: this.props.grid ?? true, dims: this.props.dims ?? true,\n      fundOpen: s.fundOpen, fundCaret: s.fundOpen ? '▾' : '▸',\n\n      nlBg: isNl ? active : 'transparent', nlCol: isNl ? activeCol : inCol,\n      frBg: isNl ? 'transparent' : active, frCol: isNl ? inCol : activeCol,\n\n      ground: s.ground, cleanup: s.cleanup, ppsm: s.ppsm,\n      netFmt: fmt(net), brFmt: fmt(brotherShare), siFmt: fmt(sisterShare), payoutFmt: fmt(payout),\n      radiFmt: radiGross > 0 ? '−' + fmt(radiGross) : '−' + fmt(0),\n\n      f3: t.floor + ' 3', f2: t.floor + ' 2', f1: t.floor + ' 1',\n\n      floor3: [unit('Nordin', 'APP 3A'), unit('Rachid', 'APP 3B'), unit('Karima', 'APP 3C')],\n      floor2: [unit('Fathma', 'APP 2A'), unit('Chadia', 'APP 2B'), unit('Hedda', 'APP 2C')],\n      floor1: [unit('Radi', 'APP 1A'), unit('Abdellah', 'APP 1B'), unit('Mourad Ouissam', 'APP 1C')],\n\n      areaFmt: totalArea.toLocaleString(t.locale) + ' m²',\n      grossFmt: '≈ ' + fmt(grossTotal), discTotalFmt: fmt(discTotal), netTotalFmt: '≈ ' + fmt(netTotal),\n\n      setNl: () => this.setState({ lang: 'nl' }),\n      setFr: () => this.setState({ lang: 'fr' }),\n      onPw: (e) => this.setState({ pw: e.target.value, err: false }),\n      onKey: (e) => { if (e.key === 'Enter') check(); },\n      onSubmit: check,\n      toggleFund: () => this.setState(st => ({ fundOpen: !st.fundOpen })),\n      onGround: (e) => this.setState({ ground: e.target.value }),\n      onCleanup: (e) => this.setState({ cleanup: e.target.value }),\n      onPpsm: (e) => this.setState({ ppsm: e.target.value }),\n      onSqm: (e) => {\n        const name = e.currentTarget.dataset.name;\n        const v = e.target.value;\n        this.setState(st => ({ sqm: { ...st.sqm, [name]: v === '' ? undefined : (parseFloat(v) || 0) } }));\n      },\n      onSelect: (e) => this.setState({ selected: e.currentTarget.dataset.name }),\n      stop: (e) => e.stopPropagation(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
